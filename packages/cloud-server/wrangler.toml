name = "memcode-cloud-server"
main = "src/worker.js"
compatibility_date = "2026-05-15"
account_id = "ac4c8308ee25757eed7edbf8b47467e4"

routes = [
	{ pattern = "www.memcode.pro", zone_name = "memcode.pro" },
	{ pattern = "www.memcode.pro/*", zone_name = "memcode.pro" },
	{ pattern = "memcode.pro", zone_name = "memcode.pro" },
	{ pattern = "memcode.pro/*", zone_name = "memcode.pro" }
]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[triggers]
crons = ["0 3 * * *"]

[vars]
APP_URL = "https://www.memcode.pro"
SYNC_PAYLOAD_STORAGE = "r2"

[[d1_databases]]
binding = "DB"
database_name = "memcode"
database_id = "12fd03b0-5434-4a59-a0d5-d6d6d3b64094"

[[r2_buckets]]
binding = "SYNC_BLOBS"
bucket_name = "memcode-sync-blobs"
