<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — MemCode</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; }
    .auth-box {
      background: var(--bg-card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }
    .auth-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .auth-logo-icon { font-size: 1.8rem; }
    .auth-logo-text { font-size: 1.3rem; font-weight: 800; }
    .auth-title { font-size: 1.15rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .auth-sub { font-size: 0.85rem; color: var(--text-dim); text-align: center; margin-bottom: 28px; }
    .sso-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 11px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      margin-bottom: 10px;
    }
    .sso-btn:hover { background: var(--bg); border-color: var(--accent); text-decoration: none; }
    .sso-btn svg { flex-shrink: 0; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-dim); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 5px; }
    .auth-input {
      width: 100%; padding: 10px 13px; font-size: 0.9rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: var(--font); outline: none; margin-bottom: 12px;
      transition: border-color 0.15s; box-sizing: border-box;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-error {
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
      color: var(--red); border-radius: var(--radius-sm);
      padding: 10px 12px; font-size: 0.85rem;
      margin-bottom: 14px; display: none;
    }
    .auth-error.visible { display: block; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 0.8rem; color: var(--text-dim); }
    .auth-footer a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo">
      <span class="auth-logo-icon">🧠</span>
      <span class="auth-logo-text">MemCode</span>
    </div>
    <p class="auth-title">Sign in to your account</p>
    <p class="auth-sub">Manage your Pro subscription and billing</p>

    <div id="auth-error" class="auth-error"></div>

    <!-- SSO Buttons -->
    <a id="google-btn" href="/v1/auth/google" class="sso-btn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </a>

    <a id="github-btn" href="/v1/auth/github" class="sso-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
      Continue with GitHub
    </a>

    <div class="divider">or sign in with email</div>

    <form id="login-form" novalidate>
      <label class="auth-label" for="login-email">Email address</label>
      <input class="auth-input" type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
      <label class="auth-label" for="login-password">Password</label>
      <input class="auth-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
      <button type="submit" class="btn btn-primary btn-full" id="login-submit">Sign in →</button>
    </form>

    <p class="auth-footer">
      No account? <a href="/#pricing">Get Pro</a> &nbsp;·&nbsp; <a href="/">Back to home</a>
    </p>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
